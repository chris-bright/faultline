name: privilege_escalation
domain: security
description: >
  Attempt to escalate from app user to root within the container.
  Verifies the service runs as a non-root user and that escalation attempts
  are blocked or detected — not just that the config says so.

fault:
  type: privilege_escalation
  method: sudo_abuse       # tries sudo, SUID binaries, capability abuse

baseline_seconds: 5
observation_seconds: 20
recovery_seconds: 5

compliance_tags:
  - security.least_privilege
  - container.no_privileged
