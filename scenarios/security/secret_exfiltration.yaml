name: secret_exfiltration
domain: security
description: >
  Enumerate process environment, /proc/*/environ, and mounted secrets.
  Verifies that secrets are not readable by an unprivileged process
  and that any exfiltration attempt is observable.

fault:
  type: secret_exfiltration
  methods:
    - proc_environ      # read /proc/*/environ for other processes
    - env_dump          # dump current process env
    - mounted_secrets   # check /run/secrets, /vault/secrets

baseline_seconds: 5
observation_seconds: 15
recovery_seconds: 5

compliance_tags:
  - cloud.secret_management
  - security.secret_hygiene
