name: process_freeze
domain: infrastructure
description: Freeze the main process with SIGSTOP and verify monitoring detects the hang before SIGCONT resumes it

fault:
  type: process_freeze
  process: python
  duration_seconds: 20

baseline_seconds: 10
observation_seconds: 20
recovery_seconds: 10

expect:
  max_recovery_seconds: 5
  error_rate_below: 0.5

compliance_tags:
  - infra.availability
  - infra.process_integrity
