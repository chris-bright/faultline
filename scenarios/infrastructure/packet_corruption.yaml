name: packet_corruption
domain: infrastructure
description: Inject 5% packet corruption and verify the service handles corrupted traffic without crashing

fault:
  type: packet_corruption
  percent: 5

baseline_seconds: 10
observation_seconds: 30
recovery_seconds: 15

expect:
  max_recovery_seconds: 10
  error_rate_below: 0.2

compliance_tags:
  - infra.network_resilience
  - infra.data_integrity
