services:

  simple_api:
    build: targets/simple_api
    container_name: simple_api
    ports:
      - "8080:8080"

  redis:
    build: targets/redis
    container_name: redis
    ports:
      - "6379:6379"

  grafana:
    build: targets/grafana
    container_name: grafana
    ports:
      - "3000:3000"

  keycloak:
    build: targets/keycloak
    container_name: keycloak
    ports:
      - "8081:8080"
    environment:
      - KC_HEALTH_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
